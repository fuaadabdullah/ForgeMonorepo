name: Fly Rollback Deploy (Deprecated)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running Fly rollback deploy?"
        required: false
        default: "rollback"

jobs:
  deploy-backend-fly-rollback:
    name: Rollback Deploy backend to Fly.io (Deprecated)
    runs-on: ubuntu-latest
    steps:
      - name: Deprecation notice
        run: |
          echo "Fly deployment is deprecated and retained for rollback only."

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | sh

      - name: Deploy to Fly (rollback path)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          cd apps/goblin-assistant
          /root/.fly/bin/fly deploy --remote-only --dockerfile Dockerfile.prod --config fly.toml --verbose
